# Usar con Podman: podman-compose up -d
# Si no tenés podman-compose: podman compose up -d
version: "3.9"

services:
  db:
    image: docker.io/postgres:16-alpine
    container_name: turnero-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: turnero_db
      POSTGRES_USER: turnero
      POSTGRES_PASSWORD: turnero_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnero -d turnero_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turnero-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.base
      - DATABASE_URL=postgresql://turnero:turnero_pass@db:5432/turnero_db
      - DJANGO_DEBUG=False
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload"

volumes:
  postgres_data:
  static_volume:
  media_volume:
