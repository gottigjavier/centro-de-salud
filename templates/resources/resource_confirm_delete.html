{% extends "base.html" %}
{% block title %}Desactivar {{ resource.name }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4">Desactivar Recurso</h1>
  <p class="text-gray-600 dark:text-gray-400 mb-6">
    ¿Estás seguro de que querés {% if resource.is_active %}desactivar{% else %}activar{% endif %}
    <strong>{{ resource.name }}</strong>?
  </p>
  <div class="flex justify-center space-x-3">
    <a href="{% url 'resources:list' %}"
       class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
      Cancelar
    </a>
    <form method="post" action="{% url 'resources:toggle_active' resource.pk %}">
      {% csrf_token %}
      <button type="submit"
              class="px-4 py-2 {% if resource.is_active %}bg-red-600 hover:bg-red-700{% else %}bg-green-600 hover:bg-green-700{% endif %} text-white rounded-md text-sm font-medium transition-colors">
        Sí, {% if resource.is_active %}desactivar{% else %}activar{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
